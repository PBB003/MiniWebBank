<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teller Window</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Teller Window</h1>
      <p>Physical Operations: Deposits & Withdrawals</p>
    </header>
    
    <div class="dashboard-grid">
      <section class="card">
        <h2>Account Operation</h2>
        <form id="cashier-form">
          <div class="form-group">
            <label>Client Account No.</label>
            <input type="text" id="client-number" required />
          </div>
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="op-amount" required />
          </div>
          <div class="form-group">
            <label>Concept / Note</label>
            <input type="text" id="op-note" required />
          </div>
          <div style="display: flex; gap: 1rem;">
            <button type="button" id="btn-deposit" style="background: var(--success-color)">Deposit</button>
            <button type="button" id="btn-withdraw" style="background: var(--danger-color)">Withdraw</button>
          </div>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Control Panel</h2>
        <p>Ensure you validate the client's identity before proceeding with withdrawals.</p>
        <button onclick="window.location.href='/logout'" style="background: var(--danger-color); margin-top: 2rem;">Secure Sign Out</button>
      </section>
    </div>
  </div>
  <script src="teller.js"></script>
</body>
</html>
