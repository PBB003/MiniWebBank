<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard - MiniWebBank</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>My Bank Account</h1>
      <p>Welcome to your personal dashboard.</p>
    </header>
    <div class="dashboard-grid">
      <section class="card">
        <h2>Transfer Money</h2>
        <form id="make-transfer">
          <div class="form-group">
            <label>Target Account Number</label>
            <input type="text" id="target-number" required />
          </div>
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="transfer-amount" required />
          </div>
          <button type="submit">Send Money</button>
        </form>
      </section>

      <section class="card summary-card">
        <h2>Available Balance</h2>
        <h3 id="current-balance" class="amount" style="font-size: 2.5rem; color: var(--success-color); margin: 1rem 0;">Loading...</h3>
        <p>Your money is safe with us.</p>
        <button onclick="window.location.href='/logout'" style="background: var(--danger-color); margin-top: 2rem;">Sign Out</button>
      </section>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
