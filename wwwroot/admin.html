<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM - Administrador del Banco</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MiniWebBank - Portal Administrativo</h1>
        <p>Gestión de Clientes (Acceso Restringido)</p>
      </header>
      <div class="dashboard-grid">
        <!-- PANEL: Crear Cuentas -->
        <section class="card">
          <h2>Abrir Nueva Cuenta</h2>
          <form id="create-account-form">
            <div class="form-group">
              <label>Número de Cuenta</label>
              <input type="text" id="acc-number" required />
            </div>
            <div class="form-group">
              <label>Nombre del Titular</label>
              <input type="text" id="acc-name" required />
            </div>
            <div class="form-group">
              <label>Depósito Inicial ($)</label>
              <input type="number" id="acc-balance" required />
            </div>
            <div class="form-group">
              <label>PIN de Seguridad</label>
              <input type="password" id="acc-pin" required />
            </div>
            <div class="form-group">
              <label>Rol de Usuario</label>
              <select id="acc-role">
              <option value="Client">Cliente Normal</option>
              <option value="Cajero">Cajero (Ventanilla)</option>
              <option value="Admin">Administrador Bancario</option>
            </select>
            </div>
            <button type="submit">Crear Cuenta</button>
          </form>
        </section>

        <!-- PANEL: Lista de Todas las Cuentas -->
        <section class="card">
        <h2>Base de Datos de Clientes</h2>
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <button onclick="loadAccounts()" style="flex: 1;">Refrescar Lista</button>
            <button onclick="window.location.href='/logout'" style="flex: 1; background: var(--danger-color);">Cerrar Sesión</button>
        </div>
        <ul id="accounts-list" class="transaction-list"></ul>
        </section>
      </div>
    </div>
    <script src="admin.js"></script>
  </body>
</html>
