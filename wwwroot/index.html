<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MiniWebBank</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
      .login-container { max-width: 400px; margin: 100px auto; }
  </style>
</head>
<body>
  <div class="container login-container">
    <header>
      <h1>🏦 MiniWebBank</h1>
      <p>Inicia sesión para continuar</p>
    </header>

    <section class="card" id="login-section">
      <form id="login-form">
        <div class="form-group">
          <label>Número de Cuenta (o 'admin')</label>
          <input type="text" id="login-number" required />
        </div>
        <div class="form-group">
          <label>PIN</label>
          <input type="password" id="login-pin" required />
        </div>
        <button type="submit">Entrar a mi Banco</button>
      </form>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
