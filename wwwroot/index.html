<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Banco Web</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <header>
        <h1>MiniBanco App</h1>
        <p>Tu dinero, en la web.</p>
      </header>
      <div class="dashboard-grid">
        <section class="card" id="login-section">
          <h2>Iniciar Sesión</h2>
          <form id="login-form">
            <div class="form-group">
              <label>Número de Cuenta</label>
              <input type="text" id="login-number" required />
            </div>
            <div class="form-group">
              <label>PIN</label>
              <input type="password" id="login-pin" required />
            </div>
            <button type="submit">Entrar</button>
          </form>
        </section>

        <!-- PANEL IZQUIERDO: Formulario -->
        <section class="card">
          <h2>Abrir Nueva Cuenta</h2>
          <form id="create-account-form">
            <div class="form-group">
              <label>Número de Cuenta</label>
              <input type="text" id="acc-number" required />
            </div>
            <div class="form-group">
              <label>Titular</label>
              <input type="text" id="acc-name" required />
            </div>
            <div class="form-group">
              <label>Depósito Inicial ($)</label>
              <input type="number" id="acc-balance" required />
            </div>
            <div class="form-group">
              <label>PIN de Seguridad</label>
              <input type="password" id="acc-pin" required />
            </div>
            <button type="submit">Crear Cuenta</button>
          </form>
        </section>
        <!-- PANEL DERECHO: Lista de Cuentas -->
        <section class="card">
          <h2>Mis Cuentas</h2>
          <div id="accounts-list">
            <p style="color: gray">Cargando cuentas desde el servidor...</p>
          </div>
        </section>
        <section class="card">
          <h2>Depositar</h2>
          <form id="make-deposit">
            <div class="form-group">
              <label>Numero de cuenta</label>
              <input type="text" id="deposit-acc-number" required />
            </div>
            <div class="form-group">
              <label>Monto ($)</label>
              <input type="number" id="deposit-amount" required />
            </div>
            <div class="form-group">
              <label>Nota</label>
              <input type="text" id="note" />
            </div>
            <button type="submit">Depositar</button>
          </form>
        </section>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
